server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jiangjie_museum?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root       # 改成你的数据库用户名
    password: 123456    # 改成你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL 日志
    map-underscore-to-camel-case: true  # 驼峰命名转换
  global-config:
    db-config:
      id-type: auto  # 主键自增
  mapper-locations: classpath*:/mapper/**/*.xml